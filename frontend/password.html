<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Verification</title>
<style>
body { background: #111; color: white; font-family: Arial; text-align: center; }
input {
  padding: 10px; border: none; border-radius: 5px;
  margin-top: 15px; width: 200px;
}
button {
  margin-top: 15px; padding: 10px 15px;
  background: cyan; border: none; border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1 id="welcome"></h1>
<input type="password" id="password" placeholder="Enter Password">
<br>
<button onclick="verify()">Login</button>

<p id="message" style="color: red;"></p>

<script>
const user = sessionStorage.getItem("selectedUser");
const correctPass = sessionStorage.getItem("userPass");

document.getElementById("welcome").textContent = `Welcome, ${user}`;

function verify() {
  const entered = document.getElementById("password").value;
  if (entered === correctPass) {
    window.location.href = "index.html";
  } else {
    document.getElementById("message").textContent = "Incorrect password!";
  }
}
</script>

</body>
</html>
